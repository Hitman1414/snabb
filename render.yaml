services:
  # Backend API
  - type: web
    name: snabb-api
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && alembic upgrade head"
    startCommand: "cd backend && gunicorn app.main:app -c gunicorn.conf.py --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false # Set to your Supabase URL in Render Dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: snabb-cache
          property: connectionString
      - key: REDIS_ENABLED
        value: "true"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: STORAGE_PROVIDER
        value: "s3"

  # Redis Cache
  - type: redis
    name: snabb-cache
    region: ohio
    plan: free
    ipAllowList: [] # Only allow internal connections
