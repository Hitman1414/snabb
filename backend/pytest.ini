[pytest]
# ── Custom markers ─────────────────────────────────────────────────────────────
markers =
    postgres_only: Test exercises Postgres-specific behaviour and is skipped on SQLite.

# ── Default options ────────────────────────────────────────────────────────────
# -ra  : show short summary of all non-passing tests
# -q   : quieter output
addopts = -ra
